<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Analytics - LeadGen AI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
        }
        body {
            background: #0f172a;
            color: #e2e8f0;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .navbar {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-bottom: 1px solid #334155;
        }
        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
        }
        .stat-card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        .stat-card .number {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stat-card .label {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-top: 5px;
        }
        .email-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .email-card:hover {
            border-color: #6366f1;
            transform: translateY(-2px);
        }
        .email-card.expanded {
            border-color: #6366f1;
        }
        .email-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .email-subject {
            font-weight: 600;
            font-size: 1.1rem;
            color: #f1f5f9;
        }
        .email-recipient {
            color: #94a3b8;
            font-size: 0.9rem;
        }
        .email-meta {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }
        .badge-status {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-sent { background: #065f46; color: #34d399; }
        .badge-opened { background: #1e3a5f; color: #60a5fa; }
        .badge-clicked { background: #4c1d95; color: #a78bfa; }
        .badge-pending { background: #78350f; color: #fbbf24; }
        .email-body-preview {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            display: none;
            white-space: pre-wrap;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            color: #cbd5e1;
        }
        .tracking-info {
            display: flex;
            gap: 20px;
            margin-top: 10px;
            padding: 10px;
            background: #0f172a;
            border-radius: 8px;
        }
        .tracking-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .tracking-item i {
            font-size: 1.2rem;
        }
        .filter-btn {
            background: #334155;
            border: 1px solid #475569;
            color: #e2e8f0;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .filter-btn:hover, .filter-btn.active {
            background: #6366f1;
            border-color: #6366f1;
        }
        .table-custom {
            color: #e2e8f0;
        }
        .table-custom th {
            background: #0f172a;
            border-color: #334155;
            color: #94a3b8;
            font-weight: 600;
        }
        .table-custom td {
            border-color: #334155;
            vertical-align: middle;
        }
        .timeline-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }
        .dot-sent { background: #10b981; }
        .dot-opened { background: #3b82f6; }
        .dot-clicked { background: #8b5cf6; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/dashboard">
                <i class="fas fa-chart-line me-2"></i>LeadGen AI - Analytics
            </a>
            <div class="d-flex gap-3">
                <a href="/dashboard" class="btn btn-outline-light btn-sm">
                    <i class="fas fa-tachometer-alt me-1"></i>Dashboard
                </a>
                <a href="/analytics" class="btn btn-primary btn-sm">
                    <i class="fas fa-chart-bar me-1"></i>Analytics
                </a>
                <button class="btn btn-outline-danger btn-sm" onclick="logout()">
                    <i class="fas fa-sign-out-alt me-1"></i>Logout
                </button>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- Stats Cards -->
        <div class="row mb-4">
            <div class="col-md-2">
                <div class="stat-card">
                    <div class="number" id="total-emails">0</div>
                    <div class="label">Total Sent</div>
                </div>
            </div>
            <div class="col-md-2">
                <div class="stat-card">
                    <div class="number text-success" id="total-sent">0</div>
                    <div class="label">Delivered</div>
                </div>
            </div>
            <div class="col-md-2">
                <div class="stat-card">
                    <div class="number text-info" id="total-opened">0</div>
                    <div class="label">Opened</div>
                </div>
            </div>
            <div class="col-md-2">
                <div class="stat-card">
                    <div class="number text-warning" id="total-clicked">0</div>
                    <div class="label">Clicked</div>
                </div>
            </div>
            <div class="col-md-2">
                <div class="stat-card">
                    <div class="number text-danger" id="total-bounced">0</div>
                    <div class="label">Bounced</div>
                </div>
            </div>
            <div class="col-md-2">
                <div class="stat-card">
                    <div class="number" id="open-rate">0%</div>
                    <div class="label">Open Rate</div>
                </div>
            </div>
        </div>

        <!-- Filters -->
        <div class="card p-3 mb-4">
            <div class="d-flex gap-3 align-items-center">
                <span class="text-muted">Filter:</span>
                <button class="filter-btn active" onclick="filterEmails('all')">All</button>
                <button class="filter-btn" onclick="filterEmails('SENT')">Sent</button>
                <button class="filter-btn" onclick="filterEmails('OPENED')">Opened</button>
                <button class="filter-btn" onclick="filterEmails('PENDING')">Pending</button>
                <button class="filter-btn" onclick="filterEmails('FAILED')">Failed</button>
                <div class="ms-auto">
                    <input type="text" id="search-email" class="form-control form-control-sm" 
                           placeholder="Search emails..." onkeyup="searchEmails()">
                </div>
            </div>
        </div>

        <!-- Email List -->
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0"><i class="fas fa-envelope me-2"></i>Email History</h5>
                <button class="btn btn-sm btn-outline-primary" onclick="loadEmails()">
                    <i class="fas fa-sync-alt me-1"></i>Refresh
                </button>
            </div>
            <div class="card-body" id="email-list">
                <div class="text-center py-4">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Email Detail Modal -->
        <div class="modal fade" id="emailModal" tabindex="-1">
            <div class="modal-dialog modal-lg">
                <div class="modal-content" style="background: #1e293b; border: 1px solid #334155;">
                    <div class="modal-header" style="border-color: #334155;">
                        <h5 class="modal-title"><i class="fas fa-envelope-open me-2"></i>Email Details</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body" id="email-detail-content">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let allEmails = [];
        const token = localStorage.getItem('leadgen_token');
        if (!token) window.location.href = '/';

        async function apiCall(url, options = {}) {
            const response = await fetch(url, {
                ...options,
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json',
                    ...options.headers
                }
            });
            return response.json();
        }

        async function loadEmails() {
            try {
                // Get stats
                const statsData = await apiCall('/api/stats');
                if (statsData.success) {
                    document.getElementById('total-emails').textContent = statsData.stats.total_emails;
                    document.getElementById('total-opened').textContent = statsData.stats.total_opened;
                    document.getElementById('total-clicked').textContent = statsData.stats.total_clicked;
                    
                    const rate = statsData.stats.total_emails > 0 
                        ? Math.round((statsData.stats.total_opened / statsData.stats.total_emails) * 100)
                        : 0;
                    document.getElementById('open-rate').textContent = rate + '%';
                }

                // Get ALL emails directly
                const emailData = await apiCall('/api/emails/all');
                if (emailData.success) {
                    allEmails = emailData.emails;
                    renderEmails(allEmails);
                }
            } catch (error) {
                console.error('Error loading emails:', error);
                document.getElementById('email-list').innerHTML = `
                    <div class="text-center py-4">
                        <i class="fas fa-exclamation-triangle fa-3x text-warning mb-3"></i>
                        <p class="text-muted">Error loading emails. Please try again.</p>
                    </div>
                `;
            }
        }

        function renderEmails(emails) {
            const container = document.getElementById('email-list');
            
            if (emails.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-4">
                        <i class="fas fa-inbox fa-3x text-muted mb-3"></i>
                        <p class="text-muted">No emails found. Start sending campaigns!</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = emails.map(email => `
                <div class="email-card" onclick="showEmailDetail(${email.id})" id="email-${email.id}">
                    <div class="email-header">
                        <div>
                            <div class="email-subject">${escapeHtml(email.subject)}</div>
                            <div class="email-recipient">
                                <i class="fas fa-paper-plane me-1"></i>To: ${escapeHtml(email.recipient_email || email.lead?.email || 'Unknown')}
                                ${email.lead?.company ? `<span class="ms-2 text-muted">(${escapeHtml(email.lead.company)})</span>` : ''}
                            </div>
                        </div>
                        <div>
                            <span class="badge-status badge-${email.status.toLowerCase()}">${email.status}</span>
                        </div>
                    </div>
                    <div class="email-meta">
                        <span><i class="fas fa-calendar me-1"></i>${formatDate(email.sent_at || email.created_at)}</span>
                        ${email.opened_at ? `<span class="text-info"><i class="fas fa-eye me-1"></i>Opened ${formatDate(email.opened_at)}</span>` : ''}
                        ${email.clicked_at ? `<span class="text-warning"><i class="fas fa-mouse-pointer me-1"></i>Clicked</span>` : ''}
                        <span class="text-muted"><i class="fas fa-hashtag me-1"></i>#${email.id}</span>
                    </div>
                </div>
            `).join('');
        }

        function showEmailDetail(emailId) {
            const email = allEmails.find(e => e.id === emailId);
            if (!email) return;

            const recipientEmail = email.lead?.email || extractRecipientFromEmail(email);
            const recipientCompany = email.lead?.company || 'Direct Send';

            const content = document.getElementById('email-detail-content');
            content.innerHTML = `
                <div class="row mb-4">
                    <div class="col-md-6">
                        <h6 class="text-muted mb-2">Email Info</h6>
                        <table class="table table-sm table-custom">
                            <tr><td class="text-muted">ID:</td><td>#${email.id}</td></tr>
                            <tr><td class="text-muted">Status:</td><td><span class="badge-status badge-${email.status.toLowerCase()}">${email.status}</span></td></tr>
                            <tr><td class="text-muted">Sent:</td><td>${formatDate(email.sent_at)}</td></tr>
                            <tr><td class="text-muted">Opened:</td><td>${email.opened_at ? formatDate(email.opened_at) : 'Not yet'}</td></tr>
                            <tr><td class="text-muted">Clicked:</td><td>${email.clicked_at ? formatDate(email.clicked_at) : 'No'}</td></tr>
                        </table>
                    </div>
                    <div class="col-md-6">
                        <h6 class="text-muted mb-2">Recipient</h6>
                        <table class="table table-sm table-custom">
                            <tr><td class="text-muted">Email:</td><td>${escapeHtml(recipientEmail)}</td></tr>
                            <tr><td class="text-muted">Company:</td><td>${escapeHtml(recipientCompany)}</td></tr>
                            <tr><td class="text-muted">Source:</td><td>${escapeHtml(email.lead?.source || 'Direct')}</td></tr>
                        </table>
                    </div>
                </div>

                <h6 class="text-muted mb-2"><i class="fas fa-envelope me-1"></i>Email Content</h6>
                <div class="email-body-preview" style="display: block;">
                    ${escapeHtml(email.body)}
                </div>

                <h6 class="text-muted mb-2 mt-4"><i class="fas fa-history me-1"></i>Tracking Timeline</h6>
                <div class="tracking-info flex-column">
                    <div class="tracking-item mb-2">
                        <span class="timeline-dot dot-sent"></span>
                        <span>Email sent to ${escapeHtml(recipientEmail)}</span>
                        <span class="text-muted ms-auto">${formatDate(email.sent_at)}</span>
                    </div>
                    ${email.opened_at ? `
                    <div class="tracking-item mb-2">
                        <span class="timeline-dot dot-opened"></span>
                        <span>Email opened by recipient</span>
                        <span class="text-muted ms-auto">${formatDate(email.opened_at)}</span>
                    </div>
                    ` : ''}
                    ${email.clicked_at ? `
                    <div class="tracking-item mb-2">
                        <span class="timeline-dot dot-clicked"></span>
                        <span>Link clicked</span>
                        <span class="text-muted ms-auto">${formatDate(email.clicked_at)}</span>
                    </div>
                    ` : ''}
                </div>

                <div class="mt-4 p-3" style="background: #0f172a; border-radius: 8px;">
                    <h6 class="text-muted mb-2"><i class="fas fa-info-circle me-1"></i>How Brevo Sends</h6>
                    <small class="text-muted">
                        <strong>From:</strong> Tahira Latif &lt;tara378581@gmail.com&gt;<br>
                        <strong>Via:</strong> Brevo SMTP (smtp-relay.mailin.fr)<br>
                        <strong>To:</strong> ${escapeHtml(recipientEmail)}<br>
                        <strong>Note:</strong> Emails sent via Brevo appear in your Inbox (copy) but NOT in Gmail Sent folder.
                    </small>
                </div>
            `;

            const modal = new bootstrap.Modal(document.getElementById('emailModal'));
            modal.show();
        }

        function extractRecipientFromEmail(email) {
            // Try to extract recipient from email body or subject
            const body = email.body || '';
            const match = body.match(/To:\s*(.+)/i);
            if (match) return match[1].trim();
            return 'Unknown Recipient';
        }

        function filterEmails(status) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            if (status === 'all') {
                renderEmails(allEmails);
            } else {
                renderEmails(allEmails.filter(e => e.status === status));
            }
        }

        function searchEmails() {
            const query = document.getElementById('search-email').value.toLowerCase();
            const filtered = allEmails.filter(e => 
                e.subject?.toLowerCase().includes(query) ||
                e.lead?.email?.toLowerCase().includes(query) ||
                e.lead?.company?.toLowerCase().includes(query)
            );
            renderEmails(filtered);
        }

        function formatDate(dateStr) {
            if (!dateStr) return 'N/A';
            return new Date(dateStr).toLocaleString();
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function logout() {
            localStorage.removeItem('leadgen_token');
            window.location.href = '/';
        }

        // Load on page load
        loadEmails();
    </script>
</body>
</html>
